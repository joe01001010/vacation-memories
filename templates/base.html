{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Vacation Memories{% endblock %}</title>
    <meta
        name="description"
        content="A simple vacation memories site for sharing travel photos and videos."
    >
    <link rel="stylesheet" href="{% static 'css/site.css' %}">
</head>
<body>
    <div class="page-shell">
        <header class="site-header">
            <a class="brand" href="{% url 'core:home' %}">Vacation Memories</a>
            <nav class="site-nav" aria-label="Primary navigation">
                <a href="{% url 'core:home' %}">Home</a>
            </nav>
        </header>

        <main>
            {% block content %}{% endblock %}
        </main>

        <footer class="site-footer">
            <p>Built with Django and ready for your next trip.</p>
        </footer>
    </div>
</body>
</html>
